<!DOCTYPE html>
<html>
<head>
    <title>Exercise 3</title>

    <style>
        body {
            font-family: Arial;
            background: #e5e5e5;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 700px;
            border: 1px solid #ccc;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Javascript Web Output #3</h2>

    <button onclick="loadData()">Load data from the API</button>
    <button onclick="clearTable()">Clear Table</button>

    <p>
        API: 
        <a href="https://jsonplaceholder.typicode.com/todos/" target="_blank">
            https://jsonplaceholder.typicode.com/todos/
        </a>
    </p>

    <table id="dataTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody">
           
        </tbody>
    </table>
</div>

<script src="main.js"></script>

</body>
</html>
